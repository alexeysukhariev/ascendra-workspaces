# Flat, npm-style node_modules. Chosen for cross-environment robustness; also
# sidesteps symlink-resolution issues some Windows setups hit. Works on Vercel.
nodeLinker: hoisted
# These optional native/postinstall scripts are intentionally not run; the app
# does not need them (Next falls back without sharp).
allowBuilds:
  sharp: false
  unrs-resolver: false
  msw: false
